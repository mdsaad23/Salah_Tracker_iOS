workflows:
  ios-workflow:
    name: Salah Companion iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project SalahCompanion/SalahCompanion.xcodeproj \
            -scheme SalahCompanion \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - name: Run tests
        script: |
          xcodebuild test \
            -project SalahCompanion/SalahCompanion.xcodeproj \
            -scheme SalahCompanion \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17'
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app
    publishing:
      email:
        recipients:
          - justsaad95@gmail.com
        notify:
          success: true
          failure: true
