workflows:
  ios-workflow:
    name: Salah Companion iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Generate Xcode project
        script: |
          brew list xcodegen &>/dev/null || brew install xcodegen
          xcodegen generate
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project SalahCompanion.xcodeproj \
            -scheme SalahCompanion \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - name: Run tests
        script: |
          xcodebuild test \
            -project SalahCompanion.xcodeproj \
            -scheme SalahCompanion \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - name: Capture screenshots of all screens
        ignore_failure: true
        script: |
          BUNDLE_ID="com.example.salahcompanion"
          UDID=$(xcrun simctl list devices available | grep "iPhone 17" | head -1 | grep -oE '[0-9A-F-]{36}')
          xcrun simctl bootstatus "$UDID" -b

          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*Debug-iphonesimulator/SalahCompanion.app" | head -1)
          xcrun simctl install "$UDID" "$APP_PATH"

          # Grant location access (after install, so the TCC entry binds to the
          # installed app) and set a stable, theme-appropriate location - Mecca.
          # The app also seeds a manual Makkah location below, so screenshots are
          # deterministic even without GPS.
          xcrun simctl privacy "$UDID" grant location "$BUNDLE_ID"
          xcrun simctl location "$UDID" set 21.4225,39.8262

          SCREENSHOT_DIR="$(pwd)/screenshots"
          mkdir -p "$SCREENSHOT_DIR"

          # Launch into a given screen (-UITestSeed seeds deterministic prayer
          # logs on first run) and capture it in both light and dark appearance.
          shoot() {
            screen="$1"; name="$2"
            xcrun simctl launch --terminate-running-process "$UDID" "$BUNDLE_ID" \
              -UITestSeed YES -UITestScreen "$screen"
            sleep 6
            xcrun simctl ui "$UDID" appearance light
            sleep 1
            xcrun simctl io "$UDID" screenshot "$SCREENSHOT_DIR/${name}_light.png"
            xcrun simctl ui "$UDID" appearance dark
            sleep 1
            xcrun simctl io "$UDID" screenshot "$SCREENSHOT_DIR/${name}_dark.png"
          }

          shoot home home
          shoot consistency consistency
          shoot qibla qibla
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphonesimulator/*.app
      - screenshots/*.png
    publishing:
      email:
        recipients:
          - justsaad95@gmail.com
        notify:
          success: true
          failure: true
