workflows:
  ios-workflow:
    name: Salah Companion iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Generate Xcode project
        script: |
          brew list xcodegen &>/dev/null || brew install xcodegen
          xcodegen generate
      - name: Build iOS app
        script: |
          xcodebuild build \
            -project SalahCompanion.xcodeproj \
            -scheme SalahCompanion \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - name: Run tests
        script: |
          xcodebuild test \
            -project SalahCompanion.xcodeproj \
            -scheme SalahCompanion \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - justsaad95@gmail.com
        notify:
          success: true
          failure: true
